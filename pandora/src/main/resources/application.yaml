spring:
  thymeleaf:
    enabled: false
  graphql:
    graphiql:
      enabled: true
    schema:
      printer:
        enabled: true
      locations: classpath*:graphql/**/
    cors:
      allowed-origins: "*"
  docker:
    compose:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/avatar
    username: admin
    password: admin
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
logging:
  level:
    web: debug
    graphql: debug