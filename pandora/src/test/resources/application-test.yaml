spring:
  thymeleaf:
    enabled: false
  graphql:
    graphiql:
      enabled: true
  datasource:
    url: jdbc:tc:postgis:16-3.4-alpine:///avatar
    username: admin
    password: admin
  sql:
    init:
      mode: never
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true

logging:
  level:
    web: debug