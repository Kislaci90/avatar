query searchLocation($count: Int!, $offset: Int!, $filter: LocationFilter!, $sort: String) {
    searchLocations(count: $count, offset: $offset, filter: $filter, sort:  $sort) {
        total
        pageable {
            pageNumber
            pageSize
        }
        content {
            id
            name
            description
            website
            address {
                addressLine
                postalCode
                city
            }
            contact {
                contactName
                email
                phoneNumber
            }
            geom {
                x
                y
            }
            properties
            pitches {
                id
                name
                pitchType
                surfaceType
                properties
            }
        }
    }
}