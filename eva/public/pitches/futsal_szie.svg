<svg
        viewBox="0 0 600 400"
        xmlns="http://www.w3.org/2000/svg"
        width="600"
        height="400"
>
    <!-- Background / pitch -->
    <rect width="600" height="400" fill="#7ba05b" id="pitch-bg" />

    <!-- Midline -->
    <line x1="300" y1="0" x2="300" y2="400" stroke="#ffffff" stroke-width="2" />

    <!-- Center circle -->
    <circle cx="300" cy="200" r="2" fill="#ffffff" />

    <!-- Left goal area -->
    <rect x="0" y="140" width="60" height="120" stroke="#ffffff" fill="none" stroke-width="2" />
    <!-- Right goal area -->
    <rect x="540" y="140" width="60" height="120" stroke="#ffffff" fill="none" stroke-width="2" />
</svg>


