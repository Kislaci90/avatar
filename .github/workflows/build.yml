name: Build and Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  PANDORA_IMAGE: pandora

jobs:
  build-backend:
    name: Build Backend (Pandora)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission to gradlew
        run: chmod +x pandora/gradlew

      - name: Build with Gradle
        run: cd pandora && ./gradlew build -x test

      - name: Run tests
        run: cd pandora && ./gradlew test

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: pandora/build/test-results/test/*.xml
          check_name: Backend Tests
          comment_mode: always

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: pandora/build/reports/tests/test/

  build-frontend:
    name: Build Frontend (Eva)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: eva/package-lock.json

      - name: Install dependencies
        run: cd eva && npm ci

      - name: Build frontend
        run: cd eva && npm run build

      - name: Run linting
        run: cd eva && npm run lint

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: eva/dist/

  docker-build:
    name: Build Docker Image
    needs: build-backend
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.PANDORA_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: pandora
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-report-summary:
    name: Test Report Summary
    runs-on: ubuntu-latest
    needs:
      - build-backend
      - build-frontend
    if: always()
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend test results
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: test-results/backend
        continue-on-error: true

      - name: Download frontend test results
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: test-results/frontend
        continue-on-error: true

      - name: Create test summary
        run: |
          echo "# 🧪 Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Backend Tests" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.build-backend.result }}" = "success" ]; then
            echo "✅ Backend tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Backend tests failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Frontend Tests" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.build-frontend.result }}" = "success" ]; then
            echo "✅ Frontend linting and build successful" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Frontend linting or build failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- [Backend Test Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

      - name: Comment PR with test results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const backendStatus = '${{ needs.build-backend.result }}';
            const frontendStatus = '${{ needs.build-frontend.result }}';
            
            const backendBadge = backendStatus === 'success' ? '✅' : '❌';
            const frontendBadge = frontendStatus === 'success' ? '✅' : '❌';
            
            const comment = `## 🧪 Test Results
            
            | Component | Status |
            |-----------|--------|
            | Backend | ${backendBadge} ${backendStatus} |
            | Frontend | ${frontendBadge} ${frontendStatus} |

            **Workflow Run**: [View Details](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });


