name: Security Scanning with Snyk

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main, master, develop]

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  snyk-security:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Snyk scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
        continue-on-error: true

      - name: Upload results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: snyk.sarif
        if: always()

  dependency-check:
    name: Dependency Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: eva/package-lock.json

      - name: Check npm dependencies
        run: |
          cd eva
          npm audit --audit-level=moderate
        continue-on-error: true

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: gradle

      - name: Check Gradle dependencies
        run: |
          cd pandora
          ./gradlew dependencyCheck
        continue-on-error: true

      - name: Post security findings
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            let message = '## 🔒 Security Scan Results\n\n';
            message += '### Vulnerability Report\n';
            message += '- **Frontend Dependencies**: Scanned ✓\n';
            message += '- **Backend Dependencies**: Scanned ✓\n';
            message += '- **Known Vulnerabilities**: Checked\n\n';
            message += '⚠️ Review the [Security tab](../../security) for detailed findings.\n';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });

